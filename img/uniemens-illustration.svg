<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgUe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navyUe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldUe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowUe" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shUe" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgUe)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowUe)"/>

  <!-- Document with verified UniEmens flow -->
  <g filter="url(#shUe)">
    <rect x="120" y="100" width="280" height="320" rx="14" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <!-- Header -->
    <rect x="120" y="100" width="280" height="56" rx="14" fill="url(#navyUe)"/>
    <rect x="120" y="135" width="280" height="21" fill="url(#navyUe)"/>
    <text x="145" y="135" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff">FLUSSO UniEmens</text>
    <circle cx="378" cy="128" r="8" fill="#b67c20"/>

    <!-- Code line 1 -->
    <rect x="145" y="180" width="20" height="20" rx="3" fill="url(#goldUe)"/>
    <text x="155" y="195" font-family="Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <rect x="175" y="184" width="180" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <circle cx="370" cy="190" r="8" fill="#16a34a"/>
    <path d="M366 190l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Code line 2 -->
    <rect x="145" y="215" width="20" height="20" rx="3" fill="url(#goldUe)"/>
    <text x="155" y="230" font-family="Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <rect x="175" y="219" width="160" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <circle cx="370" cy="225" r="8" fill="#16a34a"/>
    <path d="M366 225l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Code line 3 -->
    <rect x="145" y="250" width="20" height="20" rx="3" fill="url(#goldUe)"/>
    <text x="155" y="265" font-family="Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <rect x="175" y="254" width="195" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <circle cx="370" cy="260" r="8" fill="#16a34a"/>
    <path d="M366 260l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Code line 4 -->
    <rect x="145" y="285" width="20" height="20" rx="3" fill="url(#goldUe)"/>
    <text x="155" y="300" font-family="Menlo, monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <rect x="175" y="289" width="170" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <circle cx="370" cy="295" r="8" fill="#16a34a"/>
    <path d="M366 295l3 3 5-6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Status footer -->
    <rect x="145" y="330" width="230" height="60" rx="10" fill="#f0f7f0"/>
    <circle cx="170" cy="360" r="14" fill="#16a34a"/>
    <path d="M163 360l5 5 9-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="195" y="356" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0d3856">Verifica preventiva</text>
    <text x="195" y="372" font-family="Inter, sans-serif" font-size="11" fill="#6b7c8c">Nessun passaggio automatico</text>
  </g>

  <!-- Decorative shield with check -->
  <g filter="url(#shUe)">
    <path d="M450 80 L470 88 v22 c0 12-8 22-20 26-12-4-20-14-20-26V88l20-8z" fill="url(#goldUe)"/>
    <path d="M442 105l5 5 9-10" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom badge -->
  <g filter="url(#shUe)">
    <rect x="170" y="445" width="180" height="50" rx="25" fill="url(#navyUe)"/>
    <text x="260" y="476" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">SUPPORTO OPERATIVO</text>
  </g>
</svg>
