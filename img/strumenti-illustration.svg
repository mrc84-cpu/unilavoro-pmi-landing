<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgSt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navySt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldSt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowSt" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shSt" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgSt)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowSt)"/>

  <!-- 4 Tool cards in a 2x2 grid -->

  <!-- Card 01: Fondo Conoscenza (formazione) -->
  <g filter="url(#shSt)">
    <rect x="80" y="100" width="160" height="160" rx="16" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="80" y="100" width="160" height="6" rx="3" fill="url(#navySt)"/>
    <text x="100" y="135" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20">01</text>
    <!-- Book icon -->
    <path d="M120 165h60v50h-60z" fill="url(#navySt)" rx="2"/>
    <path d="M150 165v50" stroke="#fff" stroke-width="1.5"/>
    <rect x="125" y="172" width="20" height="3" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="125" y="180" width="14" height="3" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="155" y="172" width="20" height="3" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="155" y="180" width="14" height="3" rx="1" fill="#fff" opacity="0.7"/>
    <text x="160" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856" text-anchor="middle">FORMAZIONE</text>
  </g>

  <!-- Card 02: Mediprev (sanità) -->
  <g filter="url(#shSt)">
    <rect x="280" y="100" width="160" height="160" rx="16" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="280" y="100" width="160" height="6" rx="3" fill="url(#goldSt)"/>
    <text x="300" y="135" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20">02</text>
    <!-- Plus medical icon -->
    <circle cx="360" cy="190" r="35" fill="url(#goldSt)"/>
    <rect x="354" y="172" width="12" height="36" rx="2" fill="#fff"/>
    <rect x="342" y="184" width="36" height="12" rx="2" fill="#fff"/>
    <text x="360" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856" text-anchor="middle">SANITÀ</text>
  </g>

  <!-- Card 03: EB-Work (bilateralità) -->
  <g filter="url(#shSt)">
    <rect x="80" y="280" width="160" height="160" rx="16" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="80" y="280" width="160" height="6" rx="3" fill="url(#goldSt)"/>
    <text x="100" y="315" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20">03</text>
    <!-- Two people / handshake icon -->
    <circle cx="140" cy="355" r="13" fill="url(#navySt)"/>
    <path d="M122 388c2-10 9-15 18-15s16 5 18 15" fill="url(#navySt)"/>
    <circle cx="180" cy="355" r="13" fill="#b67c20"/>
    <path d="M162 388c2-10 9-15 18-15s16 5 18 15" fill="#b67c20"/>
    <text x="160" y="425" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856" text-anchor="middle">BILATERALITÀ</text>
  </g>

  <!-- Card 04: Assistenza contrattuale -->
  <g filter="url(#shSt)">
    <rect x="280" y="280" width="160" height="160" rx="16" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="280" y="280" width="160" height="6" rx="3" fill="url(#navySt)"/>
    <text x="300" y="315" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20">04</text>
    <!-- Document with check -->
    <rect x="335" y="332" width="55" height="68" rx="4" fill="#fff" stroke="url(#navySt)" stroke-width="2.5"/>
    <line x1="345" y1="346" x2="380" y2="346" stroke="#0d3856" stroke-width="2" stroke-linecap="round"/>
    <line x1="345" y1="358" x2="380" y2="358" stroke="#0d3856" stroke-width="2" stroke-linecap="round"/>
    <line x1="345" y1="370" x2="370" y2="370" stroke="#0d3856" stroke-width="2" stroke-linecap="round"/>
    <circle cx="382" cy="395" r="14" fill="url(#goldSt)"/>
    <path d="M375 395l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="360" y="425" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856" text-anchor="middle">CONTRATTI</text>
  </g>

  <!-- Center connector -->
  <circle cx="260" cy="270" r="22" fill="url(#navySt)" filter="url(#shSt)"/>
  <text x="260" y="276" font-family="Inter, sans-serif" font-size="11" font-weight="900" fill="#b67c20" text-anchor="middle">PMI</text>

  <!-- Bottom badge -->
  <g filter="url(#shSt)">
    <rect x="170" y="465" width="180" height="40" rx="20" fill="url(#navySt)"/>
    <text x="260" y="491" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4 STRUMENTI ATTIVABILI</text>
  </g>
</svg>
