<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgPr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navyPr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldPr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowPr" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shCard" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgPr)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowPr)"/>

  <!-- Closed/locked box (unused opportunity) -->
  <g filter="url(#shCard)">
    <rect x="120" y="170" width="170" height="170" rx="14" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="135" y="195" width="140" height="14" rx="3" fill="#0d3856" opacity="0.12"/>
    <rect x="135" y="220" width="100" height="10" rx="3" fill="#0d3856" opacity="0.10"/>
    <rect x="135" y="240" width="120" height="10" rx="3" fill="#0d3856" opacity="0.10"/>
    <!-- Lock symbol -->
    <rect x="190" y="275" width="30" height="28" rx="4" fill="url(#navyPr)"/>
    <path d="M195 275v-8a10 10 0 0 1 20 0v8" stroke="url(#navyPr)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="205" cy="290" r="3" fill="#b67c20"/>
  </g>

  <!-- Question marks floating -->
  <g filter="url(#shCard)">
    <circle cx="370" cy="160" r="42" fill="url(#goldPr)"/>
    <text x="370" y="178" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#fff" text-anchor="middle">?</text>
  </g>

  <g filter="url(#shCard)">
    <circle cx="395" cy="320" r="32" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <text x="395" y="334" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#0d3856" text-anchor="middle">?</text>
  </g>

  <g filter="url(#shCard)">
    <circle cx="135" cy="395" r="28" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <text x="135" y="408" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#b67c20" text-anchor="middle">?</text>
  </g>

  <!-- Dotted connections -->
  <path d="M290 220 Q330 180 348 168" stroke="#b67c20" stroke-width="2" stroke-dasharray="4 6" fill="none" opacity="0.6"/>
  <path d="M290 320 Q340 320 365 320" stroke="#0d3856" stroke-width="2" stroke-dasharray="4 6" fill="none" opacity="0.4"/>

  <!-- Bottom label badge -->
  <g filter="url(#shCard)">
    <rect x="170" y="420" width="180" height="50" rx="25" fill="url(#navyPr)"/>
    <text x="260" y="451" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">OPPORTUNITÀ FERME</text>
  </g>
</svg>
