<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgEs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navyEs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldEs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowEs" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shEs" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgEs)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowEs)"/>

  <!-- Calculator -->
  <g filter="url(#shEs)">
    <rect x="80" y="100" width="200" height="280" rx="18" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <!-- Display -->
    <rect x="100" y="120" width="160" height="60" rx="8" fill="url(#navyEs)"/>
    <text x="245" y="148" font-family="Menlo, monospace" font-size="14" font-weight="700" fill="#b67c20" text-anchor="end">€ 960/mese</text>
    <text x="245" y="170" font-family="Menlo, monospace" font-size="18" font-weight="900" fill="#fff" text-anchor="end">11.520 €</text>

    <!-- Buttons grid -->
    <g>
      <rect x="100" y="195" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="118" y="218" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">7</text>
      <rect x="142" y="195" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="160" y="218" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">8</text>
      <rect x="184" y="195" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="202" y="218" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">9</text>
      <rect x="226" y="195" width="35" height="35" rx="6" fill="url(#goldEs)"/>
      <text x="244" y="219" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">×</text>

      <rect x="100" y="237" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="118" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">4</text>
      <rect x="142" y="237" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="160" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">5</text>
      <rect x="184" y="237" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="202" y="260" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">6</text>
      <rect x="226" y="237" width="35" height="35" rx="6" fill="url(#goldEs)"/>
      <text x="244" y="260" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">−</text>

      <rect x="100" y="279" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="118" y="302" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">1</text>
      <rect x="142" y="279" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="160" y="302" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">2</text>
      <rect x="184" y="279" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="202" y="302" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">3</text>
      <rect x="226" y="279" width="35" height="35" rx="6" fill="url(#goldEs)"/>
      <text x="244" y="302" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">+</text>

      <rect x="100" y="321" width="77" height="35" rx="6" fill="#f0f4f9"/>
      <text x="138" y="344" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">0</text>
      <rect x="184" y="321" width="35" height="35" rx="6" fill="#f0f4f9"/>
      <text x="202" y="344" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0d3856" text-anchor="middle">,</text>
      <rect x="226" y="321" width="35" height="35" rx="6" fill="url(#navyEs)"/>
      <text x="244" y="344" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle">=</text>
    </g>
  </g>

  <!-- Floating receipt with stats -->
  <g filter="url(#shEs)">
    <rect x="310" y="130" width="160" height="220" rx="12" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="310" y="130" width="160" height="6" rx="3" fill="url(#goldEs)"/>
    <text x="390" y="170" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20" text-anchor="middle">PRIMA FASE</text>
    <line x1="325" y1="180" x2="455" y2="180" stroke="#dde4ec"/>

    <text x="325" y="205" font-family="Inter, sans-serif" font-size="12" fill="#6b7c8c">Aziende</text>
    <text x="455" y="205" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#0d3856" text-anchor="end">6</text>

    <text x="325" y="232" font-family="Inter, sans-serif" font-size="12" fill="#6b7c8c">Cedolini</text>
    <text x="455" y="232" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#0d3856" text-anchor="end">48</text>

    <text x="325" y="259" font-family="Inter, sans-serif" font-size="12" fill="#6b7c8c">Mese</text>
    <text x="455" y="259" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#b67c20" text-anchor="end">384 €</text>

    <line x1="325" y1="275" x2="455" y2="275" stroke="#dde4ec" stroke-dasharray="3 3"/>

    <text x="390" y="298" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b67c20" text-anchor="middle">SECONDA FASE</text>

    <text x="325" y="320" font-family="Inter, sans-serif" font-size="12" fill="#6b7c8c">+ aziende</text>
    <text x="455" y="320" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#0d3856" text-anchor="end">+ 8</text>

    <text x="325" y="340" font-family="Inter, sans-serif" font-size="12" fill="#6b7c8c">+ mese</text>
    <text x="455" y="340" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#b67c20" text-anchor="end">+ 576 €</text>
  </g>

  <!-- Bottom badge -->
  <g filter="url(#shEs)">
    <rect x="170" y="430" width="180" height="50" rx="25" fill="url(#navyEs)"/>
    <text x="260" y="461" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">CALCOLO PROGRESSIVO</text>
  </g>
</svg>
