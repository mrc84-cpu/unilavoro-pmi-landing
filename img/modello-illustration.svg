<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgMo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navyMo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldMo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowMo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shMo" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgMo)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowMo)"/>

  <!-- Funnel: 3 stages becoming smaller -->
  <g filter="url(#shMo)">
    <!-- Stage 1: wide -->
    <rect x="100" y="120" width="320" height="80" rx="14" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <circle cx="140" cy="160" r="20" fill="url(#navyMo)"/>
    <text x="140" y="167" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">01</text>
    <rect x="175" y="145" width="180" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <rect x="175" y="165" width="120" height="10" rx="3" fill="#0d3856" opacity="0.30"/>

    <!-- Arrow down -->
    <path d="M260 210 L260 220 M250 215 L260 225 L270 215" stroke="#b67c20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Stage 2: medium -->
    <rect x="135" y="230" width="250" height="80" rx="14" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <circle cx="175" cy="270" r="20" fill="url(#navyMo)"/>
    <text x="175" y="277" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">02</text>
    <rect x="210" y="255" width="140" height="12" rx="3" fill="#0d3856" opacity="0.85"/>
    <rect x="210" y="275" width="100" height="10" rx="3" fill="#0d3856" opacity="0.30"/>

    <!-- Arrow down -->
    <path d="M260 320 L260 330 M250 325 L260 335 L270 325" stroke="#b67c20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Stage 3: narrow, gold -->
    <rect x="170" y="340" width="180" height="80" rx="14" fill="url(#goldMo)"/>
    <circle cx="205" cy="380" r="20" fill="#fff"/>
    <text x="205" y="387" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#b67c20" text-anchor="middle">03</text>
    <path d="M236 380l8 8 14-16" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(35,0)"/>
    <rect x="245" y="365" width="90" height="12" rx="3" fill="#fff" opacity="0.95"/>
    <rect x="245" y="385" width="60" height="10" rx="3" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Side decorations -->
  <circle cx="60" cy="260" r="6" fill="#b67c20" opacity="0.4"/>
  <circle cx="475" cy="260" r="6" fill="#b67c20" opacity="0.4"/>
  <circle cx="50" cy="350" r="4" fill="#0d3856" opacity="0.3"/>
  <circle cx="475" cy="180" r="4" fill="#0d3856" opacity="0.3"/>

  <!-- Bottom badge -->
  <g filter="url(#shMo)">
    <rect x="170" y="445" width="180" height="50" rx="25" fill="url(#navyMo)"/>
    <text x="260" y="476" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">PERCORSO PROGRESSIVO</text>
  </g>
</svg>
