<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgGradV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navyGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3856"/>
      <stop offset="100%" stop-color="#0a2c44"/>
    </linearGradient>
    <linearGradient id="goldGradV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <filter id="shadowV" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="520" fill="url(#bgGradV)" rx="24"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="50" fill="#b67c20" opacity="0.07"/>
  <circle cx="470" cy="470" r="60" fill="#0d3856" opacity="0.06"/>

  <!-- Grid pattern -->
  <g opacity="0.3">
    <circle cx="420" cy="80" r="2" fill="#0d3856"/>
    <circle cx="450" cy="80" r="2" fill="#0d3856"/>
    <circle cx="420" cy="110" r="2" fill="#0d3856"/>
    <circle cx="450" cy="110" r="2" fill="#0d3856"/>
    <circle cx="80" cy="420" r="2" fill="#0d3856"/>
    <circle cx="110" cy="420" r="2" fill="#0d3856"/>
  </g>

  <!-- ========== MAIN CHECKLIST DOCUMENT ========== -->
  <g transform="translate(80, 60)" filter="url(#shadowV)">
    <!-- Paper -->
    <rect width="310" height="400" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- Folded corner -->
    <path d="M290 14 L310 34 L290 34 Z" fill="#e2e8f0"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="310" height="60" rx="14" fill="url(#navyGradV)"/>
    <rect x="0" y="46" width="310" height="14" fill="url(#navyGradV)"/>
    <circle cx="26" cy="30" r="9" fill="#d4a03a"/>
    <path d="M22 30l3 3 6-6" stroke="#0d3856" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="46" y="35" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.5">VERIFICHE PRELIMINARI</text>

    <!-- Checklist items -->
    <g font-family="Inter, sans-serif" font-size="12" fill="#334155">
      <!-- Item 1: CCNL -->
      <g transform="translate(24, 100)">
        <rect width="18" height="18" rx="4" fill="#b67c20"/>
        <path d="M4 9l4 4 7-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="30" y="9" font-weight="600" fill="#0d3856">CCNL applicato</text>
        <text x="30" y="24" font-size="10" fill="#64748b">Contratto collettivo verificato</text>
      </g>
      <line x1="24" y1="138" x2="286" y2="138" stroke="#f1f5f9"/>

      <!-- Item 2: Strumenti già attivi -->
      <g transform="translate(24, 150)">
        <rect width="18" height="18" rx="4" fill="#b67c20"/>
        <path d="M4 9l4 4 7-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="30" y="9" font-weight="600" fill="#0d3856">Strumenti già attivi</text>
        <text x="30" y="24" font-size="10" fill="#64748b">Mappatura della posizione attuale</text>
      </g>
      <line x1="24" y1="188" x2="286" y2="188" stroke="#f1f5f9"/>

      <!-- Item 3: Prestazioni collegate -->
      <g transform="translate(24, 200)">
        <rect width="18" height="18" rx="4" fill="#b67c20"/>
        <path d="M4 9l4 4 7-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="30" y="9" font-weight="600" fill="#0d3856">Prestazioni collegate</text>
        <text x="30" y="24" font-size="10" fill="#64748b">Coerenza tra versamento e servizi</text>
      </g>
      <line x1="24" y1="238" x2="286" y2="238" stroke="#f1f5f9"/>

      <!-- Item 4: Scelta dell'azienda -->
      <g transform="translate(24, 250)">
        <rect width="18" height="18" rx="4" fill="#b67c20"/>
        <path d="M4 9l4 4 7-8" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <text x="30" y="9" font-weight="600" fill="#0d3856">Scelta dell'azienda</text>
        <text x="30" y="24" font-size="10" fill="#64748b">Adesione e consenso formale</text>
      </g>
      <line x1="24" y1="288" x2="286" y2="288" stroke="#f1f5f9"/>

      <!-- Item 5: Flussi UniEmens -->
      <g transform="translate(24, 300)">
        <rect width="18" height="18" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
        <text x="30" y="9" font-weight="600" fill="#64748b">Flussi UniEmens</text>
        <text x="30" y="24" font-size="10" fill="#94a3b8">In corso di verifica…</text>
      </g>
      <line x1="24" y1="338" x2="286" y2="338" stroke="#f1f5f9"/>
    </g>

    <!-- Footer progress -->
    <g transform="translate(24, 360)">
      <text font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="1">AVANZAMENTO</text>
      <rect y="16" width="262" height="6" rx="3" fill="#f1f5f9"/>
      <rect y="16" width="210" height="6" rx="3" fill="url(#goldGradV)"/>
      <text x="262" y="22" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b67c20">80%</text>
    </g>
  </g>

  <!-- ========== SHIELD BADGE (right side) ========== -->
  <g transform="translate(370, 120)" filter="url(#shadowV)">
    <!-- Shield shape -->
    <path d="M50 10 L90 22 L90 60 C90 80 72 95 50 100 C28 95 10 80 10 60 L10 22 Z"
          fill="url(#navyGradV)" stroke="#d4a03a" stroke-width="2"/>
    <!-- Inner shine -->
    <path d="M50 22 L78 30 L78 58 C78 72 65 82 50 85 C35 82 22 72 22 58 L22 30 Z"
          fill="none" stroke="#d4a03a" stroke-width="0.5" opacity="0.5"/>
    <!-- Central checkmark -->
    <path d="M32 54 L45 66 L68 42" stroke="#d4a03a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Label -->
    <rect x="10" y="110" width="80" height="24" rx="12" fill="#0d3856"/>
    <text x="50" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="800" fill="#d4a03a" letter-spacing="2">VERIFICATO</text>
  </g>

  <!-- ========== STAMP "APPROVATO" ========== -->
  <g transform="translate(370, 300) rotate(-8)">
    <circle r="52" fill="none" stroke="#b67c20" stroke-width="2.5" opacity="0.7"/>
    <circle r="44" fill="none" stroke="#b67c20" stroke-width="1" opacity="0.5"/>
    <text y="-10" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="800" fill="#b67c20" letter-spacing="2" opacity="0.85">PERCORSO</text>
    <text y="8" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#b67c20" letter-spacing="3" opacity="0.9">OK</text>
    <text y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#b67c20" letter-spacing="1" opacity="0.7">UNILAVORO PMI</text>
    <path d="M-34 -20 L34 20 M-34 20 L34 -20" stroke="#b67c20" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Decorative sparkle -->
  <path d="M440 430 L443 438 L451 441 L443 444 L440 452 L437 444 L429 441 L437 438 Z" fill="#b67c20" opacity="0.6"/>
  <circle cx="50" cy="300" r="4" fill="#b67c20" opacity="0.5"/>
</svg>
