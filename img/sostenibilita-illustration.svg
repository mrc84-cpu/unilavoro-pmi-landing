<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bgSo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="navySo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4f78"/>
      <stop offset="100%" stop-color="#0d3856"/>
    </linearGradient>
    <linearGradient id="goldSo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a03a"/>
      <stop offset="100%" stop-color="#b67c20"/>
    </linearGradient>
    <radialGradient id="glowSo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b67c20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b67c20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shSo" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0d3856" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="32" fill="url(#bgSo)"/>
  <circle cx="260" cy="260" r="220" fill="url(#glowSo)"/>

  <!-- Balance scale -->
  <g filter="url(#shSo)">
    <!-- Base -->
    <rect x="240" y="380" width="40" height="50" rx="4" fill="url(#navySo)"/>
    <rect x="200" y="425" width="120" height="14" rx="4" fill="url(#navySo)"/>
    <!-- Pillar -->
    <rect x="255" y="160" width="10" height="225" fill="url(#navySo)"/>
    <!-- Top connector -->
    <circle cx="260" cy="160" r="14" fill="url(#goldSo)"/>
    <!-- Beam -->
    <rect x="100" y="156" width="320" height="8" rx="4" fill="url(#navySo)"/>

    <!-- Left chains -->
    <line x1="140" y1="164" x2="140" y2="220" stroke="#0d3856" stroke-width="2"/>
    <line x1="180" y1="164" x2="180" y2="220" stroke="#0d3856" stroke-width="2"/>

    <!-- Right chains -->
    <line x1="340" y1="164" x2="340" y2="220" stroke="#0d3856" stroke-width="2"/>
    <line x1="380" y1="164" x2="380" y2="220" stroke="#0d3856" stroke-width="2"/>
  </g>

  <!-- Left tray: lavoro studio -->
  <g filter="url(#shSo)">
    <path d="M100 220 Q160 290 220 220 Z" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="125" y="195" width="70" height="35" rx="6" fill="url(#navySo)"/>
    <text x="160" y="217" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">STUDIO</text>
  </g>

  <!-- Right tray: valore aggiunto (heavier, gold) -->
  <g filter="url(#shSo)">
    <path d="M300 220 Q360 290 420 220 Z" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <rect x="320" y="195" width="80" height="35" rx="6" fill="url(#goldSo)"/>
    <text x="360" y="217" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">VALORE</text>
  </g>

  <!-- Floating checkmark cards (principles) -->
  <g filter="url(#shSo)">
    <rect x="60" y="80" width="120" height="44" rx="22" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <circle cx="84" cy="102" r="11" fill="#16a34a"/>
    <path d="M79 102l3 3 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="105" y="106" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856">graduale</text>
  </g>

  <g filter="url(#shSo)">
    <rect x="345" y="80" width="120" height="44" rx="22" fill="#fff" stroke="#dde4ec" stroke-width="2"/>
    <circle cx="369" cy="102" r="11" fill="#16a34a"/>
    <path d="M364 102l3 3 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="390" y="106" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0d3856">sostenibile</text>
  </g>

  <g filter="url(#shSo)">
    <rect x="50" y="335" width="130" height="44" rx="22" fill="url(#navySo)"/>
    <circle cx="74" cy="357" r="11" fill="#b67c20"/>
    <path d="M69 357l3 3 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="361" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">no automatismi</text>
  </g>

  <g filter="url(#shSo)">
    <rect x="345" y="335" width="125" height="44" rx="22" fill="url(#navySo)"/>
    <circle cx="369" cy="357" r="11" fill="#b67c20"/>
    <path d="M364 357l3 3 6-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="395" y="361" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">controllo studio</text>
  </g>

  <!-- Bottom badge -->
  <g filter="url(#shSo)">
    <rect x="170" y="455" width="180" height="40" rx="20" fill="url(#goldSo)"/>
    <text x="260" y="481" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">EQUILIBRIO OPERATIVO</text>
  </g>
</svg>
